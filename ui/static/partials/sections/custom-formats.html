{{define "sections/custom-formats"}}
      <!-- ===== Custom Formats section ===== -->
      <div class="page" x-show="currentSection === 'custom-formats'">
        <div style="font-size:18px;font-weight:600;margin-bottom:4px">Custom Formats</div>
        <div style="font-size:14px;color:var(--text-muted);margin-bottom:14px;line-height:1.5">All Custom Formats from TRaSH Guides, organized by category. Use Create to build a custom format from scratch, or Import to add existing formats from an Arr instance or JSON.</div>

        <template x-if="getCFBrowseGroups(activeAppType).length > 0">
          <div>
            <!-- Toolbar: total count · search · actions. Single row to keep
                 the page tight; toolbar is sticky-feeling at the top of
                 the content rather than a separate visual band. -->
            <div class="cf-browse-toolbar">
              <div class="cf-browse-count">
                Showing <strong x-text="(getCFBrowseGroups(activeAppType) || []).reduce((acc, c) => acc + (c.totalCFs || 0), 0)"></strong> Custom Formats
                <span x-show="cfBrowseFilter" class="cf-browse-filter-hint"
                      x-text="' · ' + (filteredCFBrowseGroups(activeAppType) || []).reduce((acc, c) => acc + (c.totalCFs || 0), 0) + ' match'"></span>
              </div>
              <div class="cf-browse-search-wrap">
                <input type="search" class="cf-browse-search"
                       x-model="cfBrowseFilter"
                       placeholder="Search by CF or category name…"
                       autocomplete="off">
                <button type="button" class="cf-browse-search-clear"
                        x-show="cfBrowseFilter"
                        @click="cfBrowseFilter = ''"
                        x-tt="'Clear search'"
                        aria-label="Clear search">&#10005;</button>
              </div>
              <div class="cf-browse-actions">
                <button class="btn btn-sm" style="background:var(--accent-blue-strong);color:var(--text-on-accent);white-space:nowrap" @click="openCFEditor('create', activeAppType)">Create</button>
                <button class="btn btn-sm" style="background:var(--accent-green-strong);color:var(--text-on-accent);white-space:nowrap" @click="openImportCFModal(activeAppType)">Import</button>
              </div>
            </div>

            <template x-if="filteredCFBrowseGroups(activeAppType).length === 0">
              <div class="empty-state" style="padding:24px;text-align:center;color:var(--text-muted);font-size:13px">No Custom Formats match "<span x-text="cfBrowseFilter"></span>".</div>
            </template>

            <template x-for="cat in filteredCFBrowseGroups(activeAppType)" :key="cat.displayName">
              <div class="detail-section cf-browse-card" :class="getCategoryClass(cat.category)">
                <button type="button" class="detail-section-header cf-browse-header"
                        @click="toggleDetailSection('cfb_' + cat.displayName)"
                        :aria-expanded="isCFCategoryExpanded(cat)"
                        :style="cat.isCustom ? 'border-left:3px solid var(--accent-orange);background:var(--accent-orange-bg)' : ''">
                  <span class="cf-browse-header-text">
                    <span class="detail-section-label" :style="cat.isCustom ? 'color:var(--accent-orange)' : ''" x-text="cat.displayName"></span>
                    <!-- Description snippet — collapsed-card preview so the
                         user can tell what each category covers without a
                         click. Hidden when the card is expanded (the full
                         description renders above the CF list there). -->
                    <span class="cf-browse-snippet"
                          x-show="!isCFCategoryExpanded(cat) && cfCategorySnippet(cat)"
                          x-text="cfCategorySnippet(cat)"></span>
                  </span>
                  <span class="detail-section-count" x-text="cat.totalCFs + ' CFs'"></span>
                  <span class="detail-section-chevron" :class="{ open: isCFCategoryExpanded(cat) }">&#9654;</span>
                </button>
                <div x-show="isCFCategoryExpanded(cat)">
                  <template x-for="group in cat.groups" :key="group.name">
                    <div class="cf-section">
                      <!-- Single group in category: show CFs directly -->
                      <template x-if="cat.groups.length === 1">
                        <div>
                          <!-- Group description from TRaSH (shows above CF list when category is expanded). -->
                          <div x-show="cat.trashDescription" class="group-desc-html"
                               style="padding:6px 16px 8px;font-size:13px;color:var(--text-secondary);font-style:italic;line-height:1.5"
                               x-html="sanitizeHTML(cat.trashDescription)"></div>
                          <template x-for="cf in group.cfs" :key="cf.trashId">
                            <div class="cf-row cf-row-compact">
                              <div class="cf-name" style="flex:1">
                                <span x-text="cf.name"></span>
                                <span x-show="cf.isCustom" style="font-size:12px;color:var(--accent-orange);border:1px solid var(--accent-orange);border-radius:3px;padding:0 4px;margin-left:6px">Custom</span>
                                <span class="cf-info" x-show="cf.description" @mouseenter="showCFTooltip($event, cf.description)" @mouseleave="hideCFTooltip()">ⓘ</span>
                                <button type="button" class="inline-action" x-show="cf.isCustom" style="font-size:13px;color:var(--accent-blue);margin-left:6px" @click="openCFEditor('edit', activeAppType, cf)" x-tt="'Edit'" aria-label="Edit custom format">&#9998;</button>
                                <button type="button" class="inline-action" x-show="cf.isCustom" style="font-size:13px;color:var(--accent-red);margin-left:4px" @click="deleteCustomCF(cf, activeAppType)" x-tt="'Delete'" aria-label="Delete custom format">&#10005;</button>
                              </div>
                              <div class="cf-score" :class="cf.score > 0 ? 'positive' : cf.score < 0 ? 'negative' : 'zero'"
                                   x-text="cf.score !== undefined ? ((cf.score > 0 ? '+' : '') + cf.score) : '—'"></div>
                            </div>
                          </template>
                        </div>
                      </template>
                      <!-- Single-CF group in multi-group category: show inline -->
                      <template x-if="cat.groups.length > 1 && group.cfs.length === 1">
                        <div>
                          <template x-for="cf in group.cfs" :key="cf.trashId">
                            <div class="cf-row cf-row-compact">
                              <div class="cf-name" style="flex:1">
                                <span x-text="cf.name"></span>
                                <span x-show="cf.isCustom" style="font-size:12px;color:var(--accent-orange);border:1px solid var(--accent-orange);border-radius:3px;padding:0 4px;margin-left:6px">Custom</span>
                                <span class="cf-info" x-show="cf.description" @mouseenter="showCFTooltip($event, cf.description)" @mouseleave="hideCFTooltip()">ⓘ</span>
                                <button type="button" class="inline-action" x-show="cf.isCustom" style="font-size:13px;color:var(--accent-blue);margin-left:6px" @click="openCFEditor('edit', activeAppType, cf)" x-tt="'Edit'" aria-label="Edit custom format">&#9998;</button>
                                <button type="button" class="inline-action" x-show="cf.isCustom" style="font-size:13px;color:var(--accent-red);margin-left:4px" @click="deleteCustomCF(cf, activeAppType)" x-tt="'Delete'" aria-label="Delete custom format">&#10005;</button>
                              </div>
                              <div class="cf-score" :class="cf.score > 0 ? 'positive' : cf.score < 0 ? 'negative' : 'zero'"
                                   x-text="cf.score !== undefined ? ((cf.score > 0 ? '+' : '') + cf.score) : '—'"></div>
                            </div>
                          </template>
                        </div>
                      </template>
                      <!-- Multi-CF group: collapsible sub-headers -->
                      <template x-if="cat.groups.length > 1 && group.cfs.length > 1">
                        <div>
                          <button type="button" class="cf-section-title"
                                  @click="toggleGroupExpanded('cfb_' + cat.displayName, group.shortName)"
                                  :aria-expanded="groupExpanded['cfb_' + cat.displayName + '/' + group.shortName]">
                            <span style="display:flex;align-items:center;gap:8px">
                              <span class="detail-section-chevron" style="font-size:12px"
                                    :class="{ open: groupExpanded['cfb_' + cat.displayName + '/' + group.shortName] }">&#9654;</span>
                              <span x-text="group.shortName"></span>
                              <span style="font-size:13px;color:var(--text-muted)" x-text="group.cfs.length + ' CFs'"></span>
                            </span>
                          </button>
                          <div x-show="groupExpanded['cfb_' + cat.displayName + '/' + group.shortName]">
                            <!-- Group description from TRaSH (sourced from cat.trashDescription / group.trash_description JSON) -->
                            <div x-show="cat.trashDescription" class="group-desc-html"
                                 style="padding:6px 16px 8px;font-size:13px;color:var(--text-secondary);font-style:italic;line-height:1.5"
                                 x-html="sanitizeHTML(cat.trashDescription)"></div>
                            <template x-for="cf in group.cfs" :key="cf.trashId">
                              <div class="cf-row cf-row-compact">
                                <div class="cf-name" style="flex:1">
                                  <span x-text="cf.name"></span>
                                  <span class="cf-info" x-show="cf.description" @mouseenter="showCFTooltip($event, cf.description)" @mouseleave="hideCFTooltip()">ⓘ</span>
                                </div>
                                <div class="cf-score" :class="cf.score > 0 ? 'positive' : cf.score < 0 ? 'negative' : 'zero'"
                                     x-text="cf.score !== undefined ? ((cf.score > 0 ? '+' : '') + cf.score) : '—'"></div>
                              </div>
                            </template>
                          </div>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </template>
        <template x-if="getCFBrowseGroups(activeAppType).length === 0">
          <div class="empty-state">
            <div class="desc">Pull TRaSH data to see Custom Formats</div>
          </div>
        </template>
      </div>
{{end}}
