{{define "sections/app-pages"}}
  <!-- ==================== APP-SCOPED SECTIONS (Radarr/Sonarr) ==================== -->
  <template x-if="true">
    <div x-show="!['settings','about'].includes(currentSection) && !profileDetail && !profileBuilder">
      <!-- In-page top-nav removed in v3 — sidebar is the single nav source.
           App switcher lives in the sidebar pill; section sub-tabs live in
           the sidebar sub-nav under Profiles / Advanced; current location
           is mirrored in the banner breadcrumb. -->
      <!-- Section bodies shown by currentSection / advancedTab state. -->
      {{template "sections/profiles" .}}
      {{template "sections/custom-formats" .}}
      {{template "sections/quality-size" .}}
      {{template "sections/naming" .}}
      {{template "sections/maintenance" .}}
      {{template "sections/scoring" .}}
    </div>
  </template>
{{end}}
