{{define "layout/app-banner"}}
  <!-- v3 app context banner — sticky top of main pane. Shows which app
       and which page you're on at all times, plus user + auto-sync chip
       on the right (added in later Sprint 2 commits). Global sections
       (Settings, About) collapse to a plain text banner without swatch
       or breadcrumb separator. -->
  <header class="app-banner" :class="{ 'is-global': isGlobalSection() }"
          :aria-label="(isGlobalSection() ? 'Clonarr' : (activeAppType === 'sonarr' ? 'Sonarr' : 'Radarr')) + ' — ' + currentBreadcrumb()"
          x-show="navStyle === 'sidebar'" x-cloak>
    <!-- LEFT: brand logo + name. Settings/About show Clonarr's own
         identity (green energy-core logo + CLONARR text); everything
         else shows the active app (Radarr yellow / Sonarr blue). The
         gradient + border-fade reuse the same --app-color cascade —
         .is-global swaps the cascade to Clonarr green via CSS. -->
    <span class="app-banner-app">
      <img class="app-banner-logo"
           :src="(isGlobalSection() ? 'icons/clonarr.png' : (activeAppType === 'sonarr' ? 'icons/sonarr.png' : 'icons/radarrNew.png')) + '?v={{.Version}}'"
           alt="" aria-hidden="true">
      <span class="app-banner-appname"
            x-text="isGlobalSection() ? 'CLONARR' : (activeAppType === 'sonarr' ? 'SONARR' : 'RADARR')"></span>
    </span>

    <!-- MIDDLE: breadcrumb (always has the leading separator now since
         the left block always renders a brand anchor). -->
    <span class="app-banner-crumb">
      <span class="app-banner-sep" aria-hidden="true">/</span>
      <span x-text="currentBreadcrumb()"></span>
    </span>

    <!-- RIGHT: chips. Auto-sync chip (added in a later slice) sits to the
         left of the user chip and is hidden on global sections.
         User chip shows the logged-in username with a click-to-open
         popover containing a Logout button (POST + CSRF, same flow as
         the previous sidebar form). For local-network bypass users
         (auth required disabled for their network), shows "Local network"
         as a non-interactive chip. -->
    <span class="app-banner-right"
          @keydown.escape.window="if (userMenuOpen) { userMenuOpen = false; $nextTick(() => $refs.userMenuTrigger?.focus()) }">
      <!-- Auto-sync status chip — only shown when auto-sync is actively
           running AND has something to report (last success or unresolved
           error). Hidden when global is disabled / paused, no enabled
           rules exist, or nothing has run yet — those are intentional
           user states the chip would only nag about. Click navigates to
           Profiles → History. -->
      <template x-if="autoSyncChipVisible()">
        <button type="button" class="app-banner-autosync"
                :class="'state-' + autoSyncChipState()"
                @click="autoSyncChipClick()"
                x-tt="'Click to view sync history'">
          <span class="app-banner-autosync-dot" aria-hidden="true"></span>
          <span class="app-banner-autosync-label" x-text="autoSyncChipLabel()"></span>
        </button>
      </template>
      <!-- Authenticated user chip -->
      <template x-if="authStatus.authenticated">
        <span class="app-banner-user" :class="{ open: userMenuOpen }">
          <button type="button" class="app-banner-user-trigger"
                  x-ref="userMenuTrigger"
                  @click="userMenuOpen = !userMenuOpen"
                  :aria-expanded="userMenuOpen"
                  aria-haspopup="true">
            <svg class="app-banner-user-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span class="app-banner-user-name" x-text="authStatus.username"></span>
            <span class="app-banner-user-chev" :class="{ flip: userMenuOpen }">&#9662;</span>
          </button>
          <!-- Logout popover. role="dialog" (not "menu") since a real menu
               with single menuitem violates the ARIA pattern; aria-haspopup
               on the trigger is "true" to match. Click-outside is guarded
               against the trigger so the trigger's own @click toggle is not
               immediately undone by the outside-handler firing first. -->
          <div class="app-banner-user-menu"
               x-show="userMenuOpen" x-cloak
               @click.outside="if (!$refs.userMenuTrigger?.contains($event.target)) userMenuOpen = false"
               role="dialog"
               aria-label="Account">
            <form method="POST" action="logout" class="app-banner-user-logout-form">
              <input type="hidden" name="csrf_token" :value="csrfToken()">
              <button type="submit" class="app-banner-user-logout">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
                <span>Log out</span>
              </button>
            </form>
          </div>
        </span>
      </template>
      <!-- Local-network bypass chip — non-interactive, just signals "no login needed" -->
      <template x-if="!authStatus.authenticated && authStatus.localBypass">
        <span class="app-banner-user app-banner-user-local"
              x-tt="'Local network — authentication bypassed for this network'">
          <span class="app-banner-user-localdot" aria-hidden="true"></span>
          <span>Local network</span>
        </span>
      </template>
    </span>
  </header>

  <!-- First-run hint: when the active app has no instance configured
       AND we're not already on Settings, surface a discrete banner
       UNDER the app banner pointing users to add one. Sits below so
       it inherits the brand-strip context above and reads as a
       call-out for that specific app. Auto-hidden the moment at
       least one instance of the active type exists; never shown on
       global (Settings/About) sections. -->
  <div class="app-noinstance-banner"
       x-show="navStyle === 'sidebar' && !isGlobalSection() && instances && !instances.some(i => i.type === activeAppType)"
       x-cloak>
    <span class="app-noinstance-banner-text">
      No <strong x-text="activeAppType === 'sonarr' ? 'Sonarr' : 'Radarr'"></strong> instance configured yet. Add one to start using Clonarr.
    </span>
    <button type="button" class="app-noinstance-banner-action"
            @click="currentSection = 'settings'; settingsSection = 'instances'; inlineEditingId = (activeAppType === 'sonarr' ? 'new-sonarr' : 'new-radarr')">
      Add <span x-text="activeAppType === 'sonarr' ? 'Sonarr' : 'Radarr'"></span> instance →
    </button>
  </div>
{{end}}
