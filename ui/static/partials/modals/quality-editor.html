{{define "modals/quality-editor"}}
  <!-- Quality Items editor modal — extracted from profile-builder.html so
       it can be opened from any view. Binds to either pb.qualityItems
       (Profile Builder) or qualityStructure (Profile Detail / Sync
       Preview) depending on qualityEditorTarget. The qs-* handlers all
       take a `target` arg that selects which underlying array they
       mutate, so the same drag-and-drop UI works for both data sources. -->
  <template x-if="pb && pb.qualityEditorOpen">
    <div x-cloak
         x-data="{
           get _items() { return (qualityEditorTarget === 'builder') ? (pb.qualityItems || []) : (qualityStructure || []); },
           get _target() { return qualityEditorTarget || 'builder'; },
           get _qsCols() { const n = this._items.length; return n > 12 ? 3 : n > 6 ? 2 : 1; },
           get _qsRows() { return Math.ceil(this._items.length / this._qsCols); }
         }"
         @click.self="pb.qualityEditorOpen = false; qsCloseSharedState();"
         style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:1000;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;padding:20px">
      <!-- max-width scales with the column count: a 3-column list needs
           ~900px to breathe, a single column reads better at ~480px.
           Original 900px-static + CSS column-count was visually nicer
           but broke HTML5 drag-and-drop on items outside the first
           column (a known CSS multi-column + DnD incompatibility).
           CSS Grid with grid-auto-flow: column gives the same
           top-to-bottom column layout while keeping DnD working
           on every cell. -->
      <div :style="{ maxWidth: _qsCols === 3 ? '900px' : _qsCols === 2 ? '700px' : '480px' }"
           style="background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:8px;width:100%;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.6)">
        <div style="padding:14px 18px;border-bottom:1px solid var(--bg-muted);display:flex;align-items:flex-start;gap:10px">
          <div style="flex:1;min-width:0">
            <div style="font-size:15px;font-weight:600;color:var(--text-primary)">Edit Quality Items</div>
            <div style="font-size:12px;color:var(--text-secondary);margin-top:4px;line-height:1.4">Toggle on/off · drag to reorder · drop on a row to merge · ▶ to expand · click group name to rename</div>
          </div>
          <button @click="pb.qualityEditorOpen = false; qsCloseSharedState();"
                  x-tt="'Close (changes stay in editor state until Save)'"
                  style="background:none;border:none;color:var(--text-muted);font-size:22px;cursor:pointer;padding:0 6px;line-height:1">&times;</button>
        </div>
        <div style="padding:16px 18px;overflow-y:auto;flex:1">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">
            <div style="flex:1"></div>
            <button class="btn" style="font-size:12px;padding:2px 10px;border-color:var(--accent-orange);color:var(--accent-orange)"
                    x-tt="'Clear quality items — re-apply a preset to repopulate'"
                    @click="qsResetAll(_target)">Reset</button>
          </div>
          <!-- Grid layout with grid-auto-flow: column gives top-to-
               bottom column flow (matching the original column-count
               visual) without breaking drag-and-drop. Items go down
               column 1, then column 2, then column 3. Row count is
               computed from item count + column count so columns
               balance roughly evenly. -->
          <div :style="{
                 display: 'grid',
                 gridTemplateRows: 'repeat(' + _qsRows + ', auto)',
                 gridAutoFlow: 'column',
                 columnGap: '16px',
                 rowGap: '0'
               }">
            <template x-for="(item, idx) in _items" :key="item._id || ('qei-'+idx)">
              <div>
                <template x-if="idx === 0">
                  <div class="qs-drop-gap"
                       :class="{ 'dnd-active': qualityStructureDrag.kind, 'dnd-hover': qualityStructureDrag.dropGap === 0 }"
                       @dragover.prevent="qualityStructureDrag.dropGap = 0"
                       @dragleave="qualityStructureDrag.dropGap = null"
                       @drop.prevent="qsHandleDropOnGap(0, _target)"></div>
                </template>
                <div class="qs-row"
                     :class="{
                       'is-group': item.items,
                       'is-dragging': qualityStructureDrag.kind === 'top' && qualityStructureDrag.src === idx,
                       'dnd-merge-hover': qualityStructureDrag.dropMerge === idx
                     }"
                     :draggable="true"
                     @dragstart="event.dataTransfer.setData('text/plain', ''); qualityStructureDrag.kind = 'top'; qualityStructureDrag.src = idx;"
                     @dragover.prevent="if (qualityStructureDrag.kind && !(qualityStructureDrag.kind === 'top' && qualityStructureDrag.src === idx)) qualityStructureDrag.dropMerge = idx"
                     @dragleave="if (qualityStructureDrag.dropMerge === idx) qualityStructureDrag.dropMerge = null"
                     @drop.prevent="qsHandleDropOnRow(idx, _target)"
                     @dragend="qsResetDrag()">
                  <span class="qs-handle" x-tt="'Drag to reorder · drop on another row to merge'">⋮⋮</span>
                  <template x-if="item.items">
                    <span class="qs-chevron"
                          :class="{ open: qualityStructureExpanded[item._id] }"
                          @click="qualityStructureExpanded[item._id] = !qualityStructureExpanded[item._id]">&#9654;</span>
                  </template>
                  <template x-if="!item.items">
                    <span style="width:10px;display:inline-block"></span>
                  </template>
                  <label class="toggle toggle-sm" style="flex-shrink:0">
                    <input type="checkbox"
                           :checked="item.allowed"
                           @change="item.allowed = $event.target.checked; if (_target === 'builder') pb.qualityItems = pb.qualityItems.slice(); else qualityStructure = qualityStructure.slice();">
                    <span class="slider"></span>
                  </label>
                  <template x-if="qualityStructureRenaming !== item._id">
                    <span class="qs-name"
                          :class="item.items ? 'editable' : ''"
                          :style="item.allowed ? 'color:var(--text-primary)' : 'color:var(--text-muted)'"
                          @click="if (item.items) qsStartRename(item)"
                          x-text="item.name"></span>
                  </template>
                  <template x-if="qualityStructureRenaming === item._id">
                    <input class="qs-rename-input"
                           x-model="item.name"
                           @blur="qualityStructureRenaming = null"
                           @keyup.enter="qualityStructureRenaming = null"
                           @keyup.escape="qualityStructureRenaming = null"
                           x-init="$nextTick(() => $el.focus())">
                  </template>
                  <span x-show="item.items" class="qs-badge" x-text="item.items?.length"></span>
                  <button x-show="item.items" class="qs-tiny-x"
                          style="font-size:11px;padding:0 6px"
                          @click="qsDeleteGroup(idx, _target)" x-tt="'Delete group (members become individual singles)'">× delete</button>
                </div>
                <div class="qs-group-members"
                     x-show="item.items && qualityStructureExpanded[item._id]"
                     x-cloak
                     :class="{ 'dnd-merge-hover': qualityStructureDrag.dropMerge === idx && qualityStructureDrag.kind && !(qualityStructureDrag.kind === 'top' && qualityStructureDrag.src === idx) }"
                     @dragover.prevent="if (qualityStructureDrag.kind && !(qualityStructureDrag.kind === 'top' && qualityStructureDrag.src === idx)) qualityStructureDrag.dropMerge = idx"
                     @dragleave="if (qualityStructureDrag.dropMerge === idx) qualityStructureDrag.dropMerge = null"
                     @drop.prevent.stop="qsHandleDropOnRow(idx, _target)">
                  <template x-for="(m, mIdx) in item.items" :key="'qem-'+item._id+'-'+m+'-'+mIdx">
                    <div>
                      <div class="qs-member-gap"
                           :class="{ 'dnd-active': qualityStructureDrag.kind, 'dnd-hover': qualityStructureDrag.dropMemberGroup === idx && qualityStructureDrag.dropMemberGap === mIdx }"
                           @dragover.prevent.stop="qualityStructureDrag.dropMemberGroup = idx; qualityStructureDrag.dropMemberGap = mIdx"
                           @dragleave="if (qualityStructureDrag.dropMemberGroup === idx && qualityStructureDrag.dropMemberGap === mIdx) { qualityStructureDrag.dropMemberGroup = null; qualityStructureDrag.dropMemberGap = null; }"
                           @drop.prevent.stop="qsHandleDropOnMemberGap(idx, mIdx, _target)"></div>
                      <div class="qs-member"
                           :class="{ 'is-dragging': qualityStructureDrag.kind === 'member' && qualityStructureDrag.srcGroup === idx && qualityStructureDrag.srcMember === mIdx }">
                        <span class="qs-pill"
                              draggable="true"
                              @dragstart.stop="event.dataTransfer.setData('text/plain', ''); qualityStructureDrag.kind = 'member'; qualityStructureDrag.srcGroup = idx; qualityStructureDrag.srcMember = mIdx"
                              @dragend="qsResetDrag()"
                              x-text="m"></span>
                        <div style="flex:1"></div>
                        <button class="qs-tiny-x" @click="qsUngroupMember(idx, mIdx, _target)" x-tt="'Remove from group (back to single)'">×</button>
                      </div>
                    </div>
                  </template>
                  <div class="qs-member-gap"
                       :class="{ 'dnd-active': qualityStructureDrag.kind, 'dnd-hover': qualityStructureDrag.dropMemberGroup === idx && qualityStructureDrag.dropMemberGap === (item.items?.length || 0) }"
                       @dragover.prevent.stop="qualityStructureDrag.dropMemberGroup = idx; qualityStructureDrag.dropMemberGap = (item.items?.length || 0)"
                       @dragleave="if (qualityStructureDrag.dropMemberGroup === idx && qualityStructureDrag.dropMemberGap === (item.items?.length || 0)) { qualityStructureDrag.dropMemberGroup = null; qualityStructureDrag.dropMemberGap = null; }"
                       @drop.prevent.stop="qsHandleDropOnMemberGap(idx, item.items?.length || 0, _target)"></div>
                  <div class="qs-empty-group" x-show="item.items?.length === 0">empty group — drag a member here or click × delete</div>
                </div>
                <div class="qs-drop-gap"
                     :class="{ 'dnd-active': qualityStructureDrag.kind, 'dnd-hover': qualityStructureDrag.dropGap === idx + 1 }"
                     @dragover.prevent="qualityStructureDrag.dropGap = idx + 1"
                     @dragleave="qualityStructureDrag.dropGap = null"
                     @drop.prevent="qsHandleDropOnGap(idx + 1, _target)"></div>
              </div>
            </template>
          </div>
        </div>
      </div>
    </div>
  </template>
{{end}}
