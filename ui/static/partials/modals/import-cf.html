{{define "modals/import-cf"}}
  <!-- Import Custom CFs Modal -->
  <div class="modal-overlay" x-show="showImportCFModal" @keydown.escape.window="showImportCFModal = false" x-cloak>
    <div class="modal" style="max-width:600px" role="dialog" aria-modal="true" aria-labelledby="modal-title-import-cf" x-trap.noscroll.inert="showImportCFModal">
      <h2 id="modal-title-import-cf" class="modal-title">Import Custom Formats</h2>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:16px">
        Import custom formats from an Arr instance or JSON. Imported CFs appear in the CF browser and are available in the profile builder.
      </div>

      <!-- Source tabs -->
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
        <button class="btn btn-sm" :class="{ 'btn-primary': importCFSource === 'instance' }" @click="importCFSource = 'instance'">From Instance</button>
        <button class="btn btn-sm" :class="{ 'btn-primary': importCFSource === 'json' }" @click="importCFSource = 'json'">From JSON</button>
        <span style="font-size:11px;color:var(--accent-red);font-weight:500"
              x-tt="'CF spec values are app-specific — SourceSpecification value=3 is Web in Sonarr but Telecine in Radarr. Importing the wrong app silently breaks scoring.'">
          ⚠ Don't mix Radarr and Sonarr CFs
        </span>
      </div>

      <!-- From Instance -->
      <template x-if="importCFSource === 'instance'">
        <div>
          <div style="margin-bottom:12px">
            <label style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:4px">Instance</label>
            <select class="input" style="width:100%" x-model="importCFInstanceId" @change="fetchInstanceCFsForImport()">
              <option value="">Select instance...</option>
              <template x-for="inst in instances.filter(i => i.type === importCFAppType)" :key="inst.id">
                <option :value="inst.id" x-text="inst.name"></option>
              </template>
            </select>
          </div>

          <!-- Loading -->
          <div x-show="importCFLoading" style="text-align:center;padding:20px">
            <span class="spinner"></span> Loading custom formats...
          </div>

          <!-- CF list with filters + checkboxes -->
          <div x-show="importCFList.length > 0 && !importCFLoading">
            <!-- Filter + selection strip. "Hide guide CFs" is the
                 only filter beyond search — already-imported entries
                 stay visible (greyed + un-selectable) so the user can
                 see what's already been brought over. Select all /
                 Deselect all operate on what's currently visible. -->
            <div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px 14px;margin-bottom:8px;padding:8px 10px;background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:4px">
              <input type="search" class="input" style="flex:1;min-width:160px;font-size:12px;padding:4px 8px"
                     x-model="importCFFilter"
                     placeholder="Search by name…"
                     aria-label="Filter CFs by name">
              <label style="display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--text-secondary);white-space:nowrap">
                <input type="checkbox" x-model="importCFHideGuide">
                Hide guide CFs
              </label>
            </div>

            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
              <div style="font-size:12px;color:var(--text-muted)">
                <span x-text="importCFListFiltered().length"></span>
                <span x-show="importCFListFiltered().length !== importCFList.length"
                      x-text="' of ' + importCFList.length"></span>
                CFs shown
                (<span x-text="importCFList.filter(c => c.selected).length"></span> selected)
              </div>
              <div style="display:flex;gap:8px;flex-wrap:wrap">
                <button class="btn btn-sm"
                        @click="importCFListFiltered().forEach(c => { if (!c.exists) c.selected = true }); importCFList = [...importCFList]"
                        x-tt="'Select every visible CF that hasn\'t already been imported.'">Select all</button>
                <button class="btn btn-sm"
                        @click="importCFListFiltered().forEach(c => c.selected = false); importCFList = [...importCFList]"
                        x-tt="'Clear selections on every visible CF.'">Deselect all</button>
              </div>
            </div>
            <template x-if="importCFListFiltered().length === 0">
              <div style="font-size:12px;color:var(--text-muted);padding:16px;text-align:center;border:1px dashed var(--border-subtle);border-radius:6px">
                No CFs match the current filters. Try clearing the search or unchecking <strong>Hide guide CFs</strong>.
              </div>
            </template>
            <div x-show="importCFListFiltered().length > 0"
                 style="display:flex;flex-direction:column;max-height:340px;overflow-y:auto;border:1px solid var(--border-subtle);border-radius:6px">
              <template x-for="cf in importCFListFiltered()" :key="cf.name">
                <label style="display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer;font-size:13px;min-width:0;border-bottom:1px solid var(--border-subtle)"
                       :style="{ opacity: cf.exists ? '0.45' : '1' }">
                  <input type="checkbox" x-model="cf.selected" :disabled="cf.exists" style="flex-shrink:0">
                  <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0" x-text="cf.name"
                        x-tt="cf.exists ? cf.name + ' (already imported)' : cf.name"></span>
                  <span x-show="cf.exists"
                        style="color:var(--text-muted);font-size:11px;flex-shrink:0">already imported</span>
                  <span x-show="cf.trashMatch && !cf.exists"
                        x-tt="'This CF name matches one in the TRaSH guide. Likely managed by TRaSH already — importing creates a separate user-owned copy.'"
                        style="background:var(--accent-orange-bg);color:var(--cat-hq-release-groups);border:1px solid var(--accent-orange);border-radius:3px;padding:1px 6px;font-size:10px;font-weight:600;flex-shrink:0;cursor:help">
                    ⚠ guide
                  </span>
                </label>
              </template>
            </div>
          </div>
        </div>
      </template>

      <!-- From JSON -->
      <template x-if="importCFSource === 'json'">
        <div>
          <div style="margin-bottom:12px">
            <label style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:4px">Paste JSON (Arr CF format)</label>
            <textarea class="input" style="width:100%;height:150px;font-family:monospace;font-size:12px" x-model="importCFJsonText"
                      placeholder='[{"name":"My CF","specifications":[...]}]'></textarea>
            <div style="font-size:11px;color:var(--text-muted);margin-top:6px;line-height:1.5">
              Imports <code style="font-size:11px">name</code>, <code style="font-size:11px">specifications</code>, and <code style="font-size:11px">includeCustomFormatWhenRenaming</code>. TRaSH-specific fields (<code style="font-size:11px">trash_id</code>, <code style="font-size:11px">trash_scores</code>) are intentionally not imported — the new CF lives as your own custom format, separate from the TRaSH guide data path.
            </div>
          </div>
          <div x-show="importCFJsonError" style="font-size:12px;color:var(--accent-red);margin-bottom:8px" x-text="importCFJsonError"></div>
        </div>
      </template>

      <!-- Category picker -->
      <div style="margin-top:12px">
        <label style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:4px">Category</label>
        <div style="display:flex;gap:8px">
          <select class="input" style="flex:1" x-model="importCFCategory">
            <option value="Custom">Custom</option>
            <option value="Audio">Audio</option>
            <option value="HDR Formats">HDR Formats</option>
            <option value="HQ Release Groups">HQ Release Groups</option>
            <option value="Resolution">Resolution</option>
            <option value="Streaming Services">Streaming Services</option>
            <option value="Miscellaneous">Miscellaneous</option>
            <option value="Optional">Optional</option>
            <option value="Unwanted">Unwanted</option>
            <option value="Movie Versions">Movie Versions</option>
            <option value="Anime">Anime</option>
            <option value="Language Profiles">Language Profiles</option>
            <option value="">-- New category --</option>
          </select>
          <input x-show="importCFCategory === ''" class="input" style="flex:1" x-model="importCFNewCategory" placeholder="New category name">
        </div>
      </div>

      <!-- Result message -->
      <div x-show="importCFResult" style="margin-top:12px;font-size:12px;padding:8px 12px;border-radius:6px"
           :style="{ background: importCFResult?.error ? 'var(--accent-red-bg)' : 'var(--accent-green-bg)', color: importCFResult?.error ? 'var(--accent-red)' : 'var(--accent-green)' }"
           x-text="importCFResult?.message"></div>

      <div class="modal-actions">
        <button class="btn" @click="showImportCFModal = false">Close</button>
        <button class="btn btn-primary" @click="doImportCFs()" :disabled="importCFImporting">
          <span x-show="!importCFImporting">Import</span>
          <span x-show="importCFImporting"><span class="spinner" style="width:14px;height:14px"></span> Importing...</span>
        </button>
      </div>
    </div>
  </div>

{{end}}
