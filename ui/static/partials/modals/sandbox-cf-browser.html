{{define "modals/sandbox-cf-browser"}}
  <!-- ==================== SANDBOX CF BROWSER MODAL ==================== -->
  <div class="modal-overlay" x-show="sandboxCFBrowser.open" @keydown.escape.window="closeSandboxCFBrowser()" x-cloak>
    <div style="background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:12px;width:700px;max-width:90vw;max-height:80vh;display:flex;flex-direction:column" role="dialog" aria-modal="true" aria-labelledby="modal-title-sandbox-cf-browser" x-trap.noscroll.inert="sandboxCFBrowser.open">
      <!-- Header -->
      <div style="padding:16px 20px;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;gap:12px">
        <h2 id="modal-title-sandbox-cf-browser" style="font-size:15px;font-weight:600">Add Custom Formats</h2>
        <input type="text" class="pb-input" placeholder="Filter..." style="width:200px;font-size:13px;margin-left:auto"
               x-model="sandboxCFBrowser.filter">
        <button class="btn btn-sm" @click="closeSandboxCFBrowser()">Done</button>
      </div>

      <!-- Context line: how many CFs are already in the profile and
           therefore hidden from this list. The "Add" flow is for CFs
           the profile does NOT already have; existing CFs live in the
           Edit Scores panel. -->
      <div x-show="(sandboxCFBrowser.inProfileCount || 0) > 0"
           style="padding:8px 20px;border-bottom:1px solid var(--border-subtle);font-size:12px;color:var(--text-muted)">
        <span x-text="(sandboxCFBrowser.inProfileCount || 0) + ' custom format' + ((sandboxCFBrowser.inProfileCount || 0) === 1 ? '' : 's') + ' already in this profile (adjust in the Edit Scores panel).'"></span>
      </div>

      <!-- Category list -->
      <div style="flex:1;overflow-y:auto;padding:8px 0">
        <template x-for="cat in sandboxCFBrowser.categories || []" :key="cat.category">
          <div x-show="sandboxCFBrowserCatAddable(cat) > 0" style="margin-bottom:4px">
            <!-- Category header -->
            <div :class="getCategoryClass(cat.category)" style="margin:0 8px">
              <button type="button" class="pb-cat-header"
                      @click="sandboxCFBrowser.expanded[cat.category] = !sandboxCFBrowser.expanded[cat.category]"
                      :aria-expanded="sandboxCFBrowser.expanded[cat.category]">
                <span class="profile-group-chevron" :class="{ open: sandboxCFBrowser.expanded[cat.category] }">&#9654;</span>
                <span style="font-size:13px;font-weight:500" x-text="cat.category"></span>
                <span class="pb-cat-count" x-text="sandboxCFBrowserCatCount(cat)"></span>
              </button>
            </div>

            <!-- CFs in category. Rows for CFs already in the profile
                 are hidden so the user only sees what they can add. -->
            <div x-show="sandboxCFBrowser.expanded[cat.category]" style="padding:0 8px">
              <template x-for="group in cat.groups" :key="group.name">
                <div>
                  <template x-for="cf in group.cfs" :key="cf.trashId">
                    <div x-show="(!sandboxCFBrowser.filter || cf.name.toLowerCase().includes(sandboxCFBrowser.filter.toLowerCase())) && !sandboxCFBrowser.inProfile[cf.trashId] && !sandboxCFBrowser.inProfile[cf.name]"
                         style="display:flex;align-items:center;gap:8px;padding:2px 14px;font-size:13px"
                         @mouseenter="$el.style.background='var(--bg-elevated-hover)'" @mouseleave="$el.style.background=''">
                      <label class="toggle toggle-sm">
                        <input type="checkbox"
                               :checked="sandboxCFBrowser.selected[cf.trashId]"
                               @change="sandboxCFBrowser.selected[cf.trashId] = $event.target.checked; if($event.target.checked) { sandboxCFBrowser.scores[cf.trashId] = sandboxCFBrowser.scores[cf.trashId] ?? 0; }">
                        <span class="slider"></span>
                      </label>
                      <span style="flex:1;color:var(--text-body);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0" x-text="cf.name"></span>
                      <input x-show="sandboxCFBrowser.selected[cf.trashId]" type="number" class="pb-input"
                             style="width:75px;flex-shrink:0;font-size:12px;text-align:right;font-family:monospace"
                             :value="sandboxCFBrowser.scores[cf.trashId] ?? 0"
                             @input="sandboxCFBrowser.scores[cf.trashId] = parseInt($event.target.value) || 0">
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </div>
        </template>

        <!-- Custom CFs section -->
        <template x-if="(sandboxCFBrowser.customCFs || []).length > 0">
          <div style="margin:4px 8px 0">
            <button type="button" class="pb-cat-header" style="border-left:3px solid var(--accent-orange)"
                    @click="sandboxCFBrowser.expanded['Custom'] = !sandboxCFBrowser.expanded['Custom']"
                    :aria-expanded="sandboxCFBrowser.expanded['Custom']">
              <span class="profile-group-chevron" :class="{ open: sandboxCFBrowser.expanded['Custom'] }">&#9654;</span>
              <span style="font-size:13px;font-weight:500;color:var(--accent-orange)">Custom CFs</span>
              <span class="pb-cat-count" x-text="(sandboxCFBrowser.customCFs || []).length"></span>
            </button>
            <div x-show="sandboxCFBrowser.expanded['Custom']">
              <template x-for="cf in sandboxCFBrowser.customCFs || []" :key="cf.id">
                <div x-show="(!sandboxCFBrowser.filter || cf.name.toLowerCase().includes(sandboxCFBrowser.filter.toLowerCase())) && !sandboxCFBrowser.inProfile[cf.id] && !sandboxCFBrowser.inProfile[cf.name]"
                     style="display:flex;align-items:center;gap:8px;padding:2px 14px;font-size:13px"
                     @mouseenter="$el.style.background='var(--bg-elevated-hover)'" @mouseleave="$el.style.background=''">
                  <label class="toggle toggle-sm">
                    <input type="checkbox"
                           :checked="sandboxCFBrowser.selected[cf.id]"
                           @change="sandboxCFBrowser.selected[cf.id] = $event.target.checked; if($event.target.checked) { sandboxCFBrowser.scores[cf.id] = sandboxCFBrowser.scores[cf.id] ?? 0; }">
                    <span class="slider"></span>
                  </label>
                  <span style="flex:1;color:var(--accent-orange);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0" x-text="cf.name"></span>
                  <input x-show="sandboxCFBrowser.selected[cf.id]" type="number" class="pb-input"
                         style="width:75px;flex-shrink:0;font-size:12px;text-align:right;font-family:monospace;border-color:var(--accent-orange)"
                         :value="sandboxCFBrowser.scores[cf.id] ?? 0"
                         @input="sandboxCFBrowser.scores[cf.id] = parseInt($event.target.value) || 0">
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>

{{end}}
