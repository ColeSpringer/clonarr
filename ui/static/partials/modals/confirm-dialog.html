{{define "modals/confirm-dialog"}}
  <!-- z-index:2000 so confirm prompts always sit above any custom modal
       (e.g. Quality Items editor at z-index:1000). -->
  <div class="modal-overlay" style="z-index:2000" x-show="confirmModal.show" @click.self="confirmModal.show = false; if(confirmModal.onCancel) confirmModal.onCancel()" @keydown.escape.window="confirmModal.show = false; if(confirmModal.onCancel) confirmModal.onCancel()" x-cloak>
    <div class="modal" :style="confirmModal.wide ? 'max-width:760px' : 'max-width:420px'" role="dialog" aria-modal="true" aria-labelledby="modal-title-confirm-dialog" x-trap.noscroll.inert="confirmModal.show">
      <h2 id="modal-title-confirm-dialog" class="modal-title" x-text="confirmModal.title"></h2>
      <div style="font-size:13px;color:var(--text-muted);white-space:pre-line;line-height:1.6" x-show="!confirmModal.html" x-text="confirmModal.message"></div>
      <div style="font-size:13px;color:var(--text-muted);line-height:1.6" x-show="confirmModal.html" x-html="confirmModal.message"></div>
      <!-- Optional scrollable details list for actions whose preview can grow
           arbitrarily long (e.g. rollback affecting 70+ CFs). Caller passes
           confirmModal.details as a string array; each entry renders on its
           own line. Box scrolls within itself so the modal frame stays inside
           the viewport even with hundreds of items. -->
      <div x-show="Array.isArray(confirmModal.details) && confirmModal.details.length > 0"
           style="margin-top:10px;max-height:240px;overflow-y:auto;border:1px solid var(--border-subtle);border-radius:6px;padding:8px 10px;background:var(--bg-page);font-size:12px;color:var(--text-body);line-height:1.5;font-family:monospace">
        <template x-for="(d, i) in (confirmModal.details || [])" :key="i">
          <div x-text="d"></div>
        </template>
      </div>
      <div class="modal-actions">
        <!-- hideCancel hides the Cancel button entirely — used by info-only
             modals (e.g. naming Compare) that have a single "Close" primary
             action and don't need a redundant secondary close. Default false
             keeps the existing two-button confirm flow for all other
             callers that don't set this flag. -->
        <button x-show="!confirmModal.hideCancel" class="btn" @click="confirmModal.show = false; if(confirmModal.onCancel) confirmModal.onCancel()" x-text="confirmModal.cancelLabel || 'Cancel'"></button>
        <button x-show="confirmModal.secondaryLabel" x-cloak class="btn"
                @click="confirmModal.show = false; if(confirmModal.onSecondary) confirmModal.onSecondary()"
                x-text="confirmModal.secondaryLabel"></button>
        <button class="btn btn-primary" @click="confirmModal.show = false; if(confirmModal.onConfirm) confirmModal.onConfirm()">
          <span x-text="confirmModal.confirmLabel || 'Confirm'"></span>
        </button>
      </div>
    </div>
  </div>

{{end}}
