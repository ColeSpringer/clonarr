# yaml-language-server: $schema=https://raw.githubusercontent.com/recyclarr/recyclarr/master/schemas/config-schema.json

# SQP-4 (MA Hybrid) - Balanced Profile
# Updated 2026-03-03 from TRaSH Discord guide (2025-06-12) + last-minute updates
# Explicit scores (no score_set) — MA Hybrid variant has custom scores

radarr:
  radarr-sqp4-hybrid:
    base_url: http://radarr:7878
    api_key: !secret radarr_api_key

    quality_definition:
      type: movie

    media_naming:
      folder: default
      movie:
        rename: true
        standard: p2p-scene

    quality_profiles:
      - name: SQP-4 (MA Hybrid)
        reset_unmatched_scores:
          enabled: true
          except:
            - "P2P Internal"
        upgrade:
          allowed: true
          until_quality: Bluray|WEB-2160p
          until_score: 10000
        min_format_score: 2300
        quality_sort: top
        qualities:
          - name: Bluray|WEB-2160p
            qualities:
              - WEBDL-2160p
              - WEBRip-2160p
              - Bluray-2160p
          - name: Bluray|WEB-1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
              - Bluray-1080p

    delete_old_custom_formats: true

