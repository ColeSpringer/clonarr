name: Bug Report
description: Report a bug or unexpected behaviour in Clonarr
labels: ['needs-triage']
body:
  - type: checkboxes
    attributes:
      label: Is there an existing issue for this?
      description: Please search to see if an open or closed issue already exists for the bug you encountered. If a bug exists and it is closed as complete it may not yet be in a stable release.
      options:
        - label: I have searched the existing open and closed issues
          required: true
  - type: textarea
    attributes:
      label: Current Behavior
      description: A concise description of what you're experiencing.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected Behavior
      description: A concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. In this environment...
        2. With this config...
        3. Run '...'
        4. See error...
    validations:
      required: false
  - type: textarea
    attributes:
      label: Environment
      description: |
        examples:
          - **OS**: Ubuntu 22.04
          - **Clonarr**: 2.5.9
          - **Docker Install**: Yes
          - **Using Reverse Proxy**: No
          - **Browser**: Firefox 90 (if UI-related)
      value: |
        - OS:
        - Clonarr:
        - Docker Install:
        - Using Reverse Proxy:
        - Browser:
      render: markdown
    validations:
      required: true
  - type: textarea
    attributes:
      label: Trace Logs
      description: |
        Enable Debug Logging in Settings → Advanced and reproduce the issue, then paste the relevant log lines here. Generally speaking, all bug reports must have debug logs provided.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Anything else?
      description: |
        Links? Screenshots? References? Anything that will give us more context about the issue you are encountering.
        Tip: You can attach images or log files by clicking this area to highlight it and then dragging files in.
    validations:
      required: false
