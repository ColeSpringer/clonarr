name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      # Any in-progress feature branch builds a nightly image so testers
      # can opt in to the bleeding edge of a specific work-in-progress
      # feature by pointing their Unraid template at
      # ghcr.io/prophetse7en/clonarr:nightly-<feature-name>. The
      # branch name after `feature/` becomes the tag suffix (with any
      # internal slashes collapsed to dashes), so
      # `feature/cf-drift-detection` produces `:nightly-cf-drift-detection`
      # and two parallel feature branches never overwrite each other's
      # image.
      - 'feature/**'
    # Semver-only — vX.Y.Z and pre-releases like vX.Y.Z-rc1. Restore
    # tags or other named markers (e.g. v3-pre-classic-removal) must
    # not trigger a build: the metadata-action's tag rules don't
    # produce a docker tag for non-semver refs, so buildx errors out
    # with "tag is needed when pushing to registry".
    tags: ['v[0-9]+.[0-9]+.[0-9]+', 'v[0-9]+.[0-9]+.[0-9]+-*']
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push image to registries after build'
        required: false
        default: true
        type: boolean

env:
  IMAGE_NAME: clonarr

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      # Promote to job env so we can reference it in `if:` conditions.
      # The secrets context is unavailable to the workflow validator, causing
      # "Unrecognized named-value: 'secrets'" if used directly in `if:`.
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU (for multi-arch arm64 builds)
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Only runs when DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets are configured.
      # Forks without Docker Hub credentials skip this step gracefully.
      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ env.DOCKERHUB_USERNAME != '' && format('docker.io/{0}/{1}', env.DOCKERHUB_USERNAME, env.IMAGE_NAME) || '' }}
          tags: |
            type=raw,value=dev,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}
            type=raw,value=rc,enable=${{ startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-rc') }}
            # Single rolling :nightly tag — every feature/* push overwrites
            # it so testers on :nightly always get the latest dev work.
            # Multiple parallel feature branches cannot coexist on this tag;
            # whichever pushes last wins. The in-app version string still
            # carries branch + date + SHA so testers can confirm exactly
            # what they are running (see Determine version step below).
            type=raw,value=nightly,enable=${{ startsWith(github.ref, 'refs/heads/feature/') }}
            type=semver,pattern=v{{version}}
            type=sha,prefix=sha-,format=short,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Determine version
        id: version
        run: |
          # Tag pushes carry the semver (e.g. "3.0.0"). Branch pushes
          # include the build date + short SHA so testers can see at
          # a glance when an image was cut, and the channel prefix
          # tells them which branch produced it. Examples:
          #   main                          → dev-2026-05-30-8268786
          #   feature/cf-drift-detection    → nightly-cf-drift-detection-2026-05-30-8268786
          DATE=$(date -u +%Y-%m-%d)
          SHA_SHORT=${GITHUB_SHA::7}
          case "${{ github.ref }}" in
            refs/tags/v*)
              echo "value=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
              ;;
            refs/heads/feature/*)
              FEATURE_NAME="${GITHUB_REF#refs/heads/feature/}"
              FEATURE_NAME="${FEATURE_NAME//\//-}"
              echo "value=nightly-${FEATURE_NAME}-${DATE}-${SHA_SHORT}" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "value=dev-${DATE}-${SHA_SHORT}" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push_image }}
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=${{ steps.version.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  # Auto-create a GitHub Release whenever a clean semver tag (vX.Y.Z)
  # is pushed AND the build job succeeded. Pre-releases (vX.Y.Z-rc*)
  # are skipped because the title cell on Releases would otherwise
  # carry "rc" noise that we don't want surfaced as a stable landing
  # page.
  #
  # Body is the CHANGELOG.md section for the tag - extracted by
  # awk-walking between "## v<version>" and the next "## v" line so
  # the Release page mirrors what is already in repo, no double
  # maintenance.
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract CHANGELOG section
        id: extract
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          awk -v ver="## v${VERSION}" '
            $0 == ver { found=1; next }
            found && /^## v/ { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-body.md
          if [ ! -s /tmp/release-body.md ]; then
            echo "::error::No CHANGELOG.md section found for v${VERSION}"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.extract.outputs.version }}
          body_path: /tmp/release-body.md
          draft: false
          prerelease: false
