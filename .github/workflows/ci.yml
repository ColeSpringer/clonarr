name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: go test -race
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: vet
        run: go vet ./...
      - name: test with race detector
        run: go test -race -count=1 ./...

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: install govulncheck
        # Pinned: govulncheck@latest may require newer Go than our go.mod
        # declares. Bump together with the go.mod toolchain when Go version
        # changes. v1.1.4 works with Go 1.25.
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - name: scan
        run: govulncheck ./...

  gosec:
    name: gosec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: install gosec
        # Pinned for reproducibility. Bump deliberately (read release notes)
        # so a new gosec rule cannot turn CI red on an unrelated push.
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.26.1
      - name: scan
        # -severity high gates CI. The HIGH findings on this codebase are
        # documented false positives, suppressed inline with #nosec. MEDIUM
        # and LOW are not gated and are reviewed as they surface.
        run: gosec -severity high -quiet -fmt=text ./...
