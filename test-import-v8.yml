# Recyclarr v8 format (guide-backed profile + user-defined profile)
# Mix of v8 features: trash_id in quality_profiles, score_set, min_upgrade_format_score

radarr:
  test-v8:
    base_url: http://radarr:7878
    api_key: test123

    quality_definition:
      type: movie

    quality_profiles:
      # User-defined profile with explicit scores
      - name: Test V8 User Profile
        upgrade:
          allowed: true
          until_quality: Remux-2160p
          until_score: 10000
        min_format_score: 1500
        min_upgrade_format_score: 100
        quality_sort: top
        qualities:
          - name: Remux-2160p
          - name: WEB 2160p
            qualities:
              - WEBDL-2160p
              - WEBRip-2160p
          - name: Remux-1080p
          - name: WEB 1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
            enabled: false

    custom_formats:
      # Audio — high scores for lossless
      - trash_ids:
          - 496f355514737f7d83bf7aa4d24f8169 # TrueHD Atmos
        assign_scores_to:
          - name: Test V8 User Profile
            score: 5000

